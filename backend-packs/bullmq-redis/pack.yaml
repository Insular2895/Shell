name: bullmq-redis
version: 0.1.0
description: |
  Queue self-hosted via BullMQ + Redis.
  Alternative à Trigger.dev managé pour les ops qui veulent tout self-hosted.

use_when:
  - tu veux tout self-hosted (pas de SaaS managé)
  - high throughput jobs
  - delayed jobs / cron-like

avoid_when:
  - faible volume (Postgres SKIP LOCKED suffit, cf supabase-trigger)
  - pas envie de gérer Redis

requirements:
  env_vars:
    - REDIS_URL

related_modules:
  - upload@1.0.0
