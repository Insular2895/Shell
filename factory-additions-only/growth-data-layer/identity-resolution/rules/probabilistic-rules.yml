# growth-data-layer/identity-resolution/rules/probabilistic-rules.yml
# Cf splink-settings.json pour la config exécutée.
# Ce fichier documente l'intention.

probabilistic_rules:
  - name: same_name_same_company_email_domain
    description: Prénom + nom matchent (jaro-winkler > 0.85) ET domaine email entreprise identique
    target_score: 0.85
    action: review

  - name: same_name_same_phone_prefix
    description: Prénom + nom matchent ET phone partage les 6 premiers chiffres
    target_score: 0.75
    action: review

  - name: same_name_only
    description: Prénom + nom seuls (sans aucun autre signal)
    target_score: 0.40
    action: ignore   # trop ambigu (homonymes)
