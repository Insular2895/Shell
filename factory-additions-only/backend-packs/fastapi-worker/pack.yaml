name: fastapi-worker
version: 0.1.0
description: |
  Backend Python séparé via FastAPI pour les engines de calcul.
  Pattern utilisé par micro-saas-template-v2 (engine + worker).

use_when:
  - tu as du code Python à exposer en service
  - lourde dépendance ML/IA Python
  - separation Shell (Next.js) / Engine (Python)

avoid_when:
  - tout est en TS, pas besoin de Python

requirements:
  env_vars:
    - SHELL_INTERNAL_URL
    - SHELL_SERVICE_TOKEN

example_implementations:
  - micro-saas-template-v2/engine/   # Python adapter pattern
