# ops/services/document-extractor.yml
#
# Registre d'un site en production. Un YAML par site dans ops/services/.
# Lu par le cockpit pour afficher la liste, par les détecteurs pour savoir
# quoi monitorer, et par l'autopilot pour appliquer les modes.

site_id: document-extractor
name: Document Extractor
repo: github.com/Insular2895/document-extractor      # exemple — à créer
production_url: https://extractor.example.com
staging_url: https://staging.extractor.example.com

stack:
  frontend: nextjs
  backend: supabase
  jobs: fly-worker                                    # ou triggerdev
  analytics: umami
  errors: sentry
  uptime: uptime-kuma

finance:
  revenue_sources:
    - stripe
    - affiliate
    - lead_sales
    - api_data
  cost_sources:
    - ai_usage
    - hosting
    - storage
    - email
    - domain
    - stripe_fees
    - monitoring
  monthly_budget_eur: 100

status:
  default_mode: normal
  fallback_enabled: true
  maintenance_page: true

security:
  scans:
    - gitleaks
    - semgrep
    - trivy
    - osv
  presidio_before_ai: true

data:
  growth_data_layer: true
  consent_required: true
  sellable_data_marts: true
