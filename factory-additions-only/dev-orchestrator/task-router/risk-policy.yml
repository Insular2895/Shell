# dev-orchestrator/task-router/risk-policy.yml

# Mappe type de tâche → niveau de risque → routing
risk_by_type:
  # Faible risque : agent autonome
  add_test: low
  fix_typescript: low
  fix_lint: low
  add_loading_state: low
  add_error_state: low
  add_empty_state: low
  doc_update: low
  feature_spec_from_url: low
  feature_spec_from_screenshot: low

  # Risque moyen : agent autonome mais review_required avant merge
  create_component: medium
  create_api_route: medium
  n8n_workflow_draft: medium
  security_finding_low: medium

  # Risque élevé : ask_before, ne lance pas l'agent sans approval humaine
  create_worker: high
  create_module: high
  modify_template_core: high
  database_migration_draft: high
  security_finding_high: high

  # Critique : interdit aux agents (humain only)
  modify_billing: critical
  modify_auth: critical
  delete_data: critical
  export_data: critical
  deploy_to_production: critical

# Routing par risk_level
routing:
  low:
    auto_assign: true
    requires_approval_before_run: false
    requires_review_before_merge: false
  medium:
    auto_assign: true
    requires_approval_before_run: false
    requires_review_before_merge: true
  high:
    auto_assign: false                   # humain doit lancer la tâche
    requires_approval_before_run: true
    requires_review_before_merge: true
  critical:
    auto_assign: false
    requires_approval_before_run: true
    requires_review_before_merge: true
    blocked_for_agents: true             # même avec approval, agent ne peut pas
