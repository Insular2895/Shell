# ops-packs/maintenance/healthchecks/cron-checks.example.yml
# Healthchecks.io ou Cronitor ou healthchecks self-hosted

checks:
  - name: cron-sweep-jobs
    schedule: "*/5 * * * *"
    grace_period_minutes: 2
    description: "v2 sweep timed-out jobs cron"

  - name: cron-auto-degrade
    schedule: "0 * * * *"
    grace_period_minutes: 5
    description: "v2 auto-degrade based on activity"

  - name: cron-shared-cost-allocation
    schedule: "0 3 1 * *"  # 3am le 1er du mois
    grace_period_minutes: 30
    description: "Allocate shared costs to sites for previous month"

  - name: cron-consent-audit
    schedule: "0 4 1 * *"
    grace_period_minutes: 30
    description: "Monthly consent compliance report"

  - name: cron-backup-verify
    schedule: "0 5 * * *"
    grace_period_minutes: 30
    description: "Verify last 24h backup is healthy"
