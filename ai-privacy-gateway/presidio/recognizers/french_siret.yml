# Presidio recognizer - French SIRET (14 digits with Luhn check)
# NOTE: SIRET is PUBLIC business identifier, default action 'keep'.
# But we still detect it so it can be hashed if needed.
recognizers:
  - name: french_siret_recognizer
    supported_language: fr
    supported_entity: SIRET
    patterns:
      - name: siret_pattern
        regex: '\b\d{3}\s?\d{3}\s?\d{3}\s?\d{5}\b'
        score: 0.85
    context: [siret, siège, établissement]
