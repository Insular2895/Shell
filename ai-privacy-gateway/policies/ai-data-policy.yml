# ai-privacy-gateway/policies/ai-data-policy.yml
#
# Règles : aucune donnée client brute n'atteint un LLM externe.
# Implémenté par ai-privacy-gateway/src/redact.ts et anonymize.ts.

# ============================================================================
# Champs PII détectés et traitement par défaut
# ============================================================================

pii_fields:
  email:
    detection: presidio + regex strict
    default_action: pseudonymize  # ou redact selon mode
    pseudonym_prefix: EMAIL_
    reversible: true              # mapping local seulement

  phone:
    detection: presidio + libphonenumber
    default_action: pseudonymize
    pseudonym_prefix: PHONE_
    reversible: true

  person_name:
    detection: presidio NER
    default_action: pseudonymize
    pseudonym_prefix: PERSON_
    reversible: true

  iban:
    detection: regex IBAN + checksum
    default_action: redact
    reversible: false             # JAMAIS dans un prompt

  credit_card:
    detection: regex luhn check
    default_action: redact
    reversible: false             # JAMAIS dans un prompt

  ssn:
    detection: regex
    default_action: redact
    reversible: false

  french_siret:
    detection: regex 14-digit + checksum
    default_action: keep          # SIRET = donnée publique entreprise, OK
    reversible: false

  french_siren:
    detection: regex 9-digit
    default_action: keep
    reversible: false

  ip_address:
    detection: regex v4/v6
    default_action: hash          # sha256 pour analytics
    reversible: false

  postal_address:
    detection: presidio
    default_action: redact_partial  # garde ville/CP, supprime numéro/rue
    reversible: false

# ============================================================================
# Modes
# ============================================================================

modes:
  redact:
    description: "remplace par [REDACTED_<TYPE>] définitif"
    use_for:
      - logs
      - analytics
      - prompts IA non personnalisés (ex: classification texte)
      - debug

  pseudonymize:
    description: "remplace par <TYPE_N> avec mapping local chiffré"
    use_for:
      - CRM avec génération assistée IA
      - emails personnalisés générés par IA
      - rapports avec déanonymisation finale

  hash:
    description: "sha256 — irréversible mais déterministe"
    use_for:
      - matching cross-system
      - identity-resolution
      - analytics avec dédoublonnage

# ============================================================================
# Règles globales
# ============================================================================

rules:
  - "Tout prompt IA externe (OpenAI, Anthropic, etc.) passe par redact() ou anonymize() AVANT envoi"
  - "Le mapping pseudonyme→original NE quitte JAMAIS notre infra"
  - "Le mapping a une rétention max de 24h par défaut (configurable)"
  - "Mapping store : Redis local chiffré, jamais Supabase storage"
  - "Si un LLM est self-hosted en infra contrôlée (Ollama local), redact reste recommandé mais pseudonymize OK"
  - "Aucun champ ssn/iban/credit_card ne doit JAMAIS sortir, même hashé"

# ============================================================================
# Audit
# ============================================================================

audit:
  log_every_redaction: true       # 1 ligne par appel redact() avec types détectés
  log_every_mapping_creation: true
  weekly_report: true             # vers reports/ai-privacy/
  alert_on_unredacted_pii_in_prompt: true  # critical
