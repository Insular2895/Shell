# tools/configs/gitleaks/gitleaks.toml
# Configuration de base. Custom rules à ajouter selon les patterns spécifiques.

title = "Insular factory gitleaks config"

[allowlist]
# Faux positifs connus (.env.example contient des valeurs fictives évidentes)
paths = [
  '''\.env\.example''',
  '''README\.md''',
  '''CHANGELOG\.md''',
  '''docs/.*\.md'''
]

# Allowlist de strings (faux positifs structurels)
regexes = [
  '''sb_publishable_xxx''',
  '''sk_test_\.\.\.''',
  '''whsec_\.\.\.''',
  '''eyJ\.\.\.'''
]
