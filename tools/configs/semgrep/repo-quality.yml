rules:
  - id: no-todo-without-issue
    pattern-regex: '(TODO|FIXME|XXX)(?!.*#\d+)'
    message: "TODO/FIXME without issue reference. Add #N."
    languages: [generic]
    severity: INFO
  - id: no-console-log-in-prod-code
    pattern: console.log($X)
    paths:
      include:
        - "app/**"
        - "lib/**"
      exclude:
        - "**/__tests__/**"
        - "**/*.test.ts"
    message: "Avoid console.log in production code. Use a logger."
    languages: [typescript]
    severity: WARNING
