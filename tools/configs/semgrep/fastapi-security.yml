rules:
  - id: fastapi-no-eval
    pattern-either:
      - pattern: eval($X)
      - pattern: exec($X)
    message: "Never use eval/exec — RCE risk."
    languages: [python]
    severity: ERROR
  - id: fastapi-no-pickle-load
    pattern: pickle.loads($X)
    message: "pickle.loads on untrusted input = RCE. Use JSON or msgpack."
    languages: [python]
    severity: ERROR
  - id: fastapi-no-yaml-unsafe-load
    pattern-either:
      - pattern: yaml.load($X)
      - pattern: yaml.load($X, Loader=yaml.Loader)
    message: "yaml.load is unsafe. Use yaml.safe_load."
    languages: [python]
    severity: ERROR
