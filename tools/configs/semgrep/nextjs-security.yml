rules:
  - id: nextjs-no-cookie-without-httponly
    pattern: cookies().set($NAME, $VALUE)
    pattern-not: 'cookies().set({ ..., httpOnly: true, ... })'
    message: "Cookies should be httpOnly when storing tokens."
    languages: [typescript]
    severity: WARNING
  - id: nextjs-server-action-no-direct-db-write-without-auth
    patterns:
      - pattern: |
          'use server';
          ...
          $DB.from($T).insert($X)
      - pattern-not-inside: |
          if (!user) return ...
    message: "Server action writes to DB without checking auth. Add requireUser()."
    languages: [typescript]
    severity: ERROR
