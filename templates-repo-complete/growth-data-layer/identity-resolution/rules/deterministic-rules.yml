# growth-data-layer/identity-resolution/rules/deterministic-rules.yml
# Règles deterministes appliquées EN PREMIER (avant Splink). Score = 1.0 garanti.

rules:
  - name: same_email_hash
    sql: "a.email_hash IS NOT NULL AND a.email_hash = b.email_hash"
    score: 1.0
    auto_merge: true

  - name: same_phone_hash
    sql: "a.phone_hash IS NOT NULL AND a.phone_hash = b.phone_hash"
    score: 1.0
    auto_merge: true

  - name: same_stripe_customer_id
    sql: "a.external_ids->>'stripe' IS NOT NULL AND a.external_ids->>'stripe' = b.external_ids->>'stripe'"
    score: 1.0
    auto_merge: true

  - name: same_user_id
    sql: "a.external_ids->>'auth' IS NOT NULL AND a.external_ids->>'auth' = b.external_ids->>'auth'"
    score: 1.0
    auto_merge: true
