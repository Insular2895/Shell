# ai-privacy-gateway/policies/allowed-fields.yml
# Champs autorisés à PASSER en clair vers un LLM (sans PII).

allowed_in_prompts:
  - timestamp
  - site_id
  - product_id
  - job_id
  - feature_name
  - business_objective
  - user_role           # 'admin', 'user', 'anon' — pas l'identité
  - language
  - country_code        # ISO alpha-2 OK (FR, DE)
  - currency            # 'EUR', 'USD' OK
  - sector              # 'ecommerce', 'saas' OK
  - size_range          # '11-50' OK (pas le nombre exact d'employés)

# Tout autre champ → vérifier via detect-pii avant envoi
