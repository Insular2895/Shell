# Presidio recognizer - IBAN (international, with checksum to add in code)
recognizers:
  - name: iban_recognizer
    supported_language: any
    supported_entity: IBAN
    patterns:
      - name: iban_strict
        regex: '\b[A-Z]{2}\d{2}[A-Z0-9]{4}\d{7}([A-Z0-9]?){0,16}\b'
        score: 0.90
    context: [iban, rib, virement, bic]
