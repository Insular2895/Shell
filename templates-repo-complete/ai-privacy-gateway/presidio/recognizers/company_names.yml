# Presidio recognizer - Suffixes pointing to company names (boost NER)
recognizers:
  - name: company_suffix_recognizer
    supported_language: fr
    supported_entity: ORGANIZATION
    patterns:
      - name: company_suffix
        regex: '\b\w+\s+(SAS|SARL|SA|SASU|EURL|SCI|SNC|SCS|SCA|GIE|EI)\b'
        score: 0.80
    context: [société, entreprise, raison sociale]
