name: triggerdev
version: 0.1.0
description: |
  Trigger.dev managé pour les jobs longs.
  Alternative à supabase-trigger (queue Postgres) si tu préfères un service managé.

use_when:
  - tu veux pas gérer la queue toi-même
  - intégrations natives (Resend, OpenAI, etc.)
  - retry / observability built-in

avoid_when:
  - low volume (le free tier est généreux mais paid au-dessus)
  - tu veux 0 dépendance externe (utiliser supabase-trigger)

requirements:
  env_vars:
    - TRIGGER_API_KEY
