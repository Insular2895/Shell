# automation-packs/n8n/policies/automation-policy.yml
#
# Règles : n8n orchestre, n8n ne touche jamais directement aux données
# sensibles. Toute action data passe par notre API, qui applique
# approval-policy.

# Ce qu'un workflow n8n peut faire seul
auto_allowed:
  - read_metric_from_api          # ex: GET /api/sites/<id>/metrics
  - send_email                    # transactionnel via SMTP local
  - send_slack_message
  - create_ticket_in_plane
  - call_internal_api_read        # GET ok
  - generate_pdf_report
  - update_uptime_kuma_check

# Ce qui demande validation
ask_before:
  - export_leads                  # passe par export gate quoi qu'il arrive
  - send_marketing_email_segment
  - call_external_paid_api        # protection coût
  - modify_data_in_db             # n8n ne fait jamais d'UPDATE direct
  - publish_post

# Ce qui est interdit pour n8n
blocked:
  - direct_db_write               # toujours via API
  - access_consent_ledger_write   # append-only DB-level
  - export_without_gate           # bypass mart_sellable_leads
  - modify_secrets

# Vetting d'un nouveau workflow
vetting_rules:
  - "Tout nouveau workflow passe par template-bank/imported/ avant template-bank/reviewed/"
  - "La review valide : aucun secret en clair, credentials via références n8n, scope minimal"
  - "Approuvé → template-bank/approved/ avec versioning"
  - "Workflow modifié → re-review obligatoire (semver bump)"

# Backups et versioning
versioning:
  - "Chaque workflow exporté en JSON et committé dans workflows/"
  - "Diff de workflow visible en revue PR"
  - "Pas de modification dans n8n UI sans export après"
