# growth-data-layer/lead-scoring/intent-score-rules.yml

rules:
  # Form submissions
  - event: form_submitted
    form_type: contact
    points: 30
  - event: form_submitted
    form_type: audit_request
    points: 40
  - event: form_submitted
    form_type: demo_request
    points: 35
  - event: form_submitted
    form_type: pricing_inquiry
    points: 45

  # Page visits (cumulatif, plafonné)
  - event: page_view
    page: pricing
    points: 10
    max_count: 3
  - event: page_view
    page: features
    points: 5
    max_count: 5
  - event: page_view
    page: case_studies
    points: 8
    max_count: 3

  # Engagement
  - event: video_watched
    pct_watched_min: 50
    points: 15

  # Decay : les events de > 30j perdent 50%
decay:
  half_life_days: 30
