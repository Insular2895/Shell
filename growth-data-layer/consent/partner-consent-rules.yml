# growth-data-layer/consent/partner-consent-rules.yml
# Règles pour valider qu'un consent_partners est exploitable.

required_for_partner_share:
  - consent_partners=true (current_consents view)
  - status=granted
  - legal_text_version not null
  - legal_basis IN ('consent', 'contract')   # PAS legitimate_interest pour vente tiers
  - method NOT IN ('opt_out_link')           # opt-out implique pas un consent
  - collected_at > now() - interval '3 years' # consent expire après 3 ans

invalidation_triggers:
  - opt_out=true sur le contact
  - revoke explicite (status='revoked' nouvelle ligne)
  - data_freshness_days > 90
  - legal_text_version est obsolète (texte mis à jour)

reverification_required_when:
  - changement majeur de finalité partagée
  - changement de la liste des partenaires types
