# growth-data-layer/identity-resolution/rules/merge-thresholds.yml

thresholds:
  auto_merge: 0.90       # score > 0.90 → merge automatique
  review:                # 0.70-0.90 → INSERT merge_reviews
    min: 0.70
    max: 0.90
  ignore: 0.70           # < 0.70 → ne rien faire (trop ambigu)

review_sla_days: 14      # une merge_review pending > 14 jours → expiré (status=deferred)
